<style>

*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}

a{color:var(--brass)}a:hover{color:var(--amber)}

.case-pill{display:flex;align-items:center;gap:8px;padding:0 14px;height:100%;border-right:1px solid var(--line);cursor:pointer;font-size:12px;color:var(--cream-dim)}
.case-pill:hover{background:var(--ink);color:var(--cream)}
.case-pill .who{font-family:var(--serif);font-size:13px;color:var(--brass)}
.case-pill .meta{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase}

nav.tabs{display:flex;flex:1;overflow-x:auto;align-items:stretch}
nav.tabs button{padding:0 14px;font-size:12px;color:var(--cream-dim);letter-spacing:0.04em;display:flex;align-items:center;gap:6px;border-right:1px solid var(--line-soft);height:100%;white-space:nowrap;border-top:2px solid transparent}
nav.tabs button:hover{background:var(--ink);color:var(--cream)}
nav.tabs button.active{background:var(--ink);color:var(--brass);border-top-color:var(--brass)}

.tools-r{display:flex;align-items:center;gap:5px;padding:0 14px;height:100%;border-left:1px solid var(--line)}
.tool-btn{padding:5px 11px;border-radius:3px;font-size:11px;color:var(--cream-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid var(--line)}
.tool-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--brass)}
.tool-btn.primary{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}
.tool-btn.primary:hover{background:var(--amber);border-color:var(--amber)}

.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100dvh - 48px)}
aside.sidebar{background:var(--void-2);border-right:1px solid var(--line);overflow-y:auto;padding:14px 12px 60px;display:flex;flex-direction:column;gap:10px}
.sidebar h4{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;padding:0 4px}
.sidebar-search{display:flex;flex-direction:column;gap:6px}
.sidebar-search input,.sidebar-search select{font-size:12px;padding:6px 8px}
.case-list{display:flex;flex-direction:column;gap:3px}
.case-card{padding:9px 11px;border-radius:3px;cursor:pointer;border:1px solid transparent;border-left:3px solid var(--line);background:var(--ink);transition:all 0.1s}
.case-card:hover{background:var(--ink-2);border-left-color:var(--brass)}

.case-card .sub .tag{padding:1px 5px;border-radius:2px;background:var(--void);color:var(--cream-dim);font-size:9px}
.case-card .sub .tag.due{background:var(--ox);color:var(--cream)}
.case-card .sub .tag.status{color:var(--brass);border:1px solid var(--line)}
.empty-state{padding:18px;text-align:center;color:var(--cream-muted);font-size:12px;font-style:italic}

main{padding:18px 22px 60px;overflow-y:auto;max-width:1240px;margin:0 auto;width:100%}

.disclaimer{background:rgba(139,26,26,0.15);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:18px;font-size:12px;color:var(--cream)}

.section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;gap:14px;flex-wrap:wrap}

.section-h .actions{display:flex;gap:6px;flex-wrap:wrap}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:16px 18px}
.card h3{font-family:var(--serif);font-size:14px;font-weight:600;margin-bottom:10px;color:var(--cream);letter-spacing:0.01em}
.card h3 .meta{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.1em;margin-left:8px}

.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.row.r3{grid-template-columns:1fr 1fr 1fr}
.row.r4{grid-template-columns:1fr 1fr 1fr 1fr}
.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%}
.field .hint{font-size:10px;color:var(--cream-muted);margin-top:3px;font-family:var(--mono)}

.btn{padding:7px 14px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent;letter-spacing:0.04em;cursor:pointer}

.btn.primary{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}
.btn.primary:hover{background:var(--amber);border-color:var(--amber);color:var(--void)}
.btn.danger{border-color:var(--ox);color:var(--ox)}
.btn.danger:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,0.08)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.ghost{border-color:var(--line);color:var(--cream-dim)}
.btn.ghost:hover{border-color:var(--brass);color:var(--brass)}

table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
th,td{padding:7px 10px;border-bottom:1px solid var(--line-soft);text-align:left}

tr.total td{font-weight:600;border-top:1px solid var(--brass);border-bottom:none;padding-top:10px}
tr.total td.r{color:var(--brass)}
tr.clickable{cursor:pointer}
tr.clickable:hover{background:var(--ink)}

.bar{height:6px;background:var(--ink);border-radius:3px;overflow:hidden;margin:6px 0}
.bar > div{height:100%;background:var(--brass);transition:width 0.3s}
.bar > div.green{background:var(--green)}.bar > div.red{background:var(--red)}.bar > div.amber{background:var(--amber)}

.tag{display:inline-block;padding:2px 7px;border-radius:11px;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--brass);color:var(--brass);margin-right:4px}
.tag.amber{border-color:var(--amber);color:var(--amber)}
.tag.green{border-color:var(--green);color:var(--green)}
.tag.red{border-color:var(--red);color:var(--red)}
.tag.blue{border-color:var(--blue);color:var(--blue)}

.chat{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;padding:6px}

.chat-input{display:flex;gap:8px;margin-top:10px}
.chat-input input{flex:1;padding:11px 14px}

.timeline-item{display:grid;grid-template-columns:120px 1fr;gap:12px;padding:8px 0;border-bottom:1px dashed var(--line-soft);font-size:12px}
.timeline-item .when{font-family:var(--mono);color:var(--cream-muted);font-size:11px}

.palette-hd .glyph{font-family:var(--serif);font-size:18px;color:var(--brass)}
.palette-hd input{flex:1;border:none;background:transparent;font-size:15px;padding:4px}
.palette-bd{max-height:50vh;overflow:auto;padding:8px}
.palette-row{padding:9px 12px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px}
.palette-row:hover{background:var(--ink)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.onboard{max-width:580px;margin:5vh auto;padding:36px 32px;background:var(--void-2);border:1px solid var(--brass);border-radius:6px}
.onboard h1{font-family:var(--serif);font-size:28px;color:var(--brass);margin-bottom:6px}
.onboard .lead{color:var(--cream-dim);margin-bottom:20px;font-size:13px}
.onboard .step{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:8px}

.drawer-toggle{display:none;padding:0 12px;height:100%;align-items:center;border-right:1px solid var(--line);cursor:pointer;color:var(--brass);font-size:18px}

.flag{padding:10px 12px;border:1px solid var(--amber);background:rgba(255,140,0,0.08);border-left:3px solid var(--amber);border-radius:3px;font-size:12px;color:var(--cream);margin-bottom:10px}
.flag.red{border-color:var(--ox);background:rgba(139,26,26,0.15);border-left-color:var(--ox)}
.flag.green{border-color:var(--green);background:rgba(74,222,128,0.08);border-left-color:var(--green)}

@media (max-width:880px){
 .drawer-toggle{display:flex}
 .layout{grid-template-columns:1fr}
 aside.sidebar{position:fixed;top:48px;left:-320px;bottom:0;width:300px;z-index:50;transition:left 0.2s;box-shadow:0 0 30px rgba(0,0,0,0.6)}
 aside.sidebar.open{left:0}
 nav.tabs button{padding:0 10px;font-size:11px}
 main{padding:14px 14px 50px}
 .row,.row.r3,.row.r4{grid-template-columns:1fr}
 .brand .seal{display:none}
}
</style>

    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);
    };
    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });
    STATE.mesh.active = true;
    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');
  }
  function meshPost(kind, payload) {
    if (!STATE.mesh.active || !STATE.mesh.bc) return false;
    STATE.mesh.bc.postMessage({ kind: kind, peerId: STATE.mesh.seedId, ts: Date.now(), payload: payload });
    return true;
  }

      t.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:#c08a3a;color:#0a0a0a;padding:9px 18px;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;opacity:0;transition:all .22s;z-index:10000;pointer-events:none';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.background = kind === 'err' ? '#a14a2a' : kind === 'ok' ? '#6b8d4a' : '#c08a3a';
    t.style.color = kind === 'err' ? '#fff' : '#0a0a0a';
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(t._to);
    t._to = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(20px)'; }, 2400);
  }

  // ─── CSS for AI chip ─────────────────────────────────────────────
  function injectCss() {
    if (document.getElementById('fk-css')) return;
    const s = document.createElement('style');

  // ─── KCC Mint launcher (v1.2 · fork-this-seed shortcut) ──────────
  function openMint() {
    const slug = (STATE.config.seedName || location.hostname.split('.')[0] || 'seed').replace(/[^a-z0-9-]/gi, '-').toLowerCase();
    const name = document.title.replace(/^[◊·\s]+/, '').split('·')[0].trim() || slug;
    const url = location.href.split('?')[0].split('#')[0];
    const desc = document.querySelector('meta[name="description"]')?.content?.slice(0, 200) || '';
    const params = new URLSearchParams({ fork: '1', parent_slug: slug, parent_name: name, parent_url: url, parent_desc: desc });
    window.open(KCC_MINT_URL + '?' + params.toString(), '_blank', 'noopener');
  }

  // ─── Init ────────────────────────────────────────────────────────
  function init(opts) {
    opts = opts || {};
    injectCss();
    if (opts.seedName) STATE.config.seedName = opts.seedName;
    if ($('#fk-ai-chip')) { renderAiChip(); return { version: FALL_KIT_VERSION, mounted: false }; }
    const chip = document.createElement('button');
    chip.id = 'fk-ai-chip';
    chip.title = 'AI cascade · click to configure tier and model';
    chip.innerHTML = '<span class="fk-dot"></span><span id="fk-ai-chip-text">T0 · off</span>';
    chip.onclick = openSettings;
    // Try anchor first, fall back to floating bottom-right
    const anchor = opts.chipAnchor ? $(opts.chipAnchor) : null;
    if (anchor) { anchor.appendChild(chip); }
    else {
      chip.style.cssText += ';position:fixed;bottom:14px;left:14px;z-index:9998;box-shadow:0 4px 14px rgba(0,0,0,.4)';
      document.body.appendChild(chip);
    }
    // v1.2 · floating mint button next to chip
    if (!$('#fk-mint-btn') && !opts.hideMint) {
      const mintBtn = document.createElement('button');
      mintBtn.id = 'fk-mint-btn';
      mintBtn.title = 'Mint a fork of this seed as a KCC bundle · provenance economy';
      mintBtn.innerHTML = '<span style="font-size:13px">✦</span> mint fork';
      mintBtn.style.cssText = 'position:fixed;bottom:14px;left:130px;z-index:9998;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;cursor:pointer;border:1px solid #c08a3a;color:#c08a3a;background:rgba(10,10,15,.7);box-shadow:0 4px 14px rgba(0,0,0,.4)';
      mintBtn.onmouseover = () => { mintBtn.style.background = '#c08a3a'; mintBtn.style.color = '#0a0a0a'; };
      mintBtn.onmouseout  = () => { mintBtn.style.background = 'rgba(10,10,15,.7)'; mintBtn.style.color = '#c08a3a'; };
      mintBtn.onclick = openMint;
      document.body.appendChild(mintBtn);
    }
    renderAiChip();
    return { version: FALL_KIT_VERSION, mounted: true };
  }

  // ─── Public API ──────────────────────────────────────────────────
  root.FallKit = {
    version: FALL_KIT_VERSION,
    init: init,
    aiTier: aiTier,
    aiComplete: aiComplete,
    loadWebLLM: loadWebLLM,
    openSettings: openSettings,
    closeSettings: closeSettings,
    renderAiChip: renderAiChip,
    helpSection: helpSection,
    meshStart: meshStart,
    meshPost: meshPost,
    notify: notify,
    openMint: openMint,  // v1.2 · launch kcc-mint with this seed prefilled as parent
    MODELS: WEBLLM_MODELS,
    PROVIDERS: T3_PROVIDERS,
    state: STATE,
  };
})(typeof window !== 'undefined' ? window : globalThis);

<script>

// IDB · multi-store
// ════════════════════════════════════════════════════════════════
let db;const DB_VERSION=1;
const STORES=['firms','advisers','clients','cases','lenderProducts','audit','settings'];
function openDB(){return new Promise((res)=>{
 try{
 const r=indexedDB.open(STORE,DB_VERSION);
 r.onupgradeneeded=e=>{const d=e.target.result;for(const s of STORES){if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='settings'?undefined:'id'})}};
 r.onsuccess=e=>{db=e.target.result;res(db)};
 r.onerror=()=>{db=null;res(null)};
 }catch(e){db=null;res(null)}
})}
function idbPut(store,rec,key){return new Promise((res)=>{
 if(!db){lsPut(store,rec,key);return res()}
 try{
 const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);
 const req=key?s.put(rec,key):s.put(rec);
 tx.oncomplete=()=>res();tx.onerror=()=>{lsPut(store,rec,key);res()};
 }catch(e){lsPut(store,rec,key);res()}
})}
function idbGet(store,key){return new Promise((res)=>{
 if(!db){return res(lsGet(store,key))}
 try{
 const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).get(key);
 req.onsuccess=()=>res(req.result);req.onerror=()=>res(lsGet(store,key));
 }catch(e){res(lsGet(store,key))}
})}
function idbAll(store){return new Promise((res)=>{
 if(!db){return res(lsAll(store))}
 try{
 const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).getAll();
 req.onsuccess=()=>res(req.result||[]);req.onerror=()=>res(lsAll(store));
 }catch(e){res(lsAll(store))}
})}
function idbDel(store,key){return new Promise((res)=>{
 if(!db){lsDel(store,key);return res()}
 try{
 const tx=db.transaction(store,'readwrite');const req=tx.objectStore(store).delete(key);
 tx.oncomplete=()=>res();tx.onerror=()=>{lsDel(store,key);res()};
 }catch(e){lsDel(store,key);res()}
})}
const LSKEY=k=>STORE+'::'+k;
function lsPut(s,r,k){try{const all=JSON.parse(localStorage.getItem(LSKEY(s))||'{}');all[k||r.id]=r;localStorage.setItem(LSKEY(s),JSON.stringify(all))}catch(e){}}
function lsGet(s,k){try{const all=JSON.parse(localStorage.getItem(LSKEY(s))||'{}');return all[k]}catch(e){return null}}
function lsAll(s){try{return Object.values(JSON.parse(localStorage.getItem(LSKEY(s))||'{}'))}catch(e){return[]}}
function lsDel(s,k){try{const all=JSON.parse(localStorage.getItem(LSKEY(s))||'{}');delete all[k];localStorage.setItem(LSKEY(s),JSON.stringify(all))}catch(e){}}

async function loadAllStores(){
 state.firm=(await idbAll('firms'))[0]||null;
 state.advisers=(await idbAll('advisers'))||[];

 state.cases=(await idbAll('cases'))||[];
 state.lenderProducts=(await idbAll('lenderProducts'))||[];
 state.audit=(await idbAll('audit'))||[];
 state.audit.sort((a,b)=>(a.i||0)-(b.i||0));
 const s=await idbGet('settings','app');
 if(s)state.settings=Object.assign({},state.settings,s);
 const meta=await idbGet('settings','meta');
 if(meta){state.activeCaseId=meta.activeCaseId||null;state.active=meta.active||'dashboard';state.chat=meta.chat||[];state.filters=meta.filters||state.filters}
}

 await idbPut('settings',{activeCaseId:state.activeCaseId,active:state.active,chat:state.chat.slice(-100),filters:state.filters},'meta');
}

async function saveFirm(noBroadcast){
 if(!state.firm)return;
 state.firm.updatedAt=Date.now();
 await idbPut('firms',state.firm);
 await audit('firm.updated','Firm record updated',{id:state.firm.id,name:state.firm.name});
 if(!noBroadcast){broadcastClient('firm.updated',state.firm);broadcastMortgage('firm.updated',state.firm)}
}
async function saveAdviser(a,reason,noBroadcast){
 a.updatedAt=Date.now();await idbPut('advisers',a);
 if(!state.advisers.find(x=>x.id===a.id))state.advisers.push(a);
 else state.advisers=state.advisers.map(x=>x.id===a.id?a:x);
 await audit('adviser.updated',reason||'Adviser updated',{id:a.id,name:a.name});
 if(!noBroadcast){broadcastClientDebounced('adviser.updated',a);broadcastMortgageDebounced('adviser.updated',a)}
}
async function saveClient(c,reason,noBroadcast){
 c.updatedAt=Date.now();await idbPut('clients',c);
 if(!state.clients.find(x=>x.id===c.id))state.clients.push(c);
 else state.clients=state.clients.map(x=>x.id===c.id?c:x);
 await audit('client.updated',reason||'Client record updated',{id:c.id,name:[c.firstName,c.lastName].filter(Boolean).join(' ')});
 if(!noBroadcast){broadcastClientDebounced('client.updated',c);broadcastMortgageDebounced('client.updated',c)}
}
async function saveCase(mc,reason,noBroadcast){
 mc.updatedAt=Date.now();await idbPut('cases',mc);
 if(!state.cases.find(x=>x.id===mc.id))state.cases.push(mc);
 else state.cases=state.cases.map(x=>x.id===mc.id?mc:x);
 await audit('case.updated',reason||'Case updated',{id:mc.id,ref:mc.ref,status:mc.status});
 if(!noBroadcast)broadcastMortgageDebounced('case.updated',mc);
}

 state.cases=state.cases.filter(x=>x.id!==id);

 broadcastMortgage('case.declined',{id,ref:mc.ref,reason:'deleted'});
}

async function audit(action,reasoning,payload){
 if(!state.settings.auditChain)return;
 const prevHash=state.audit.length?state.audit[state.audit.length-1].docHash:'';
 const i=state.audit.length;
 const ts=Date.now();
 const adviserId=state.settings.currentAdviserId||'';
 const caseId=(payload&&payload.id&&action.indexOf('case.')===0)?payload.id:(state.activeCaseId||'');
 const clientId=(payload&&payload.id&&action.indexOf('client.')===0)?payload.id:'';
 const payloadStr=JSON.stringify(payload||{});
 const docHash=await sha256(prevHash+ts+action+adviserId+clientId+caseId+payloadStr);
 const entry={id:'au_'+i+'_'+ts,i,ts,tool:TOOLNAME,adviserId,clientId,caseId,action,reasoning:reasoning||'',configVersion:CONFIG_V,prevHash,docHash,payload:payload||{}};
 state.audit.push(entry);
 if(state.audit.length>5000)state.audit=state.audit.slice(-5000);
 await idbPut('audit',entry);
}

// ════════════════════════════════════════════════════════════════
// BROADCAST · fall-client + fall-mortgage + fall-signal mesh
// ════════════════════════════════════════════════════════════════
let chClient,chMortgage,chSignal;
const broadcastTimers={};
function broadcastClient(type,payload){try{chClient&&chClient.postMessage({v:1,type,ts:Date.now(),source:TOOLNAME,payload})}catch(e){}}
function broadcastMortgage(type,payload){try{chMortgage&&chMortgage.postMessage({v:1,type,ts:Date.now(),source:TOOLNAME,payload})}catch(e){}}

async function handleClientMesh(m){
 if(!m||m.source===TOOLNAME)return;
 try{
 if(m.type==='sync.request'){
 broadcastClient('sync.snapshot',{clients:state.clients,advisers:state.advisers,firm:state.firm});
 }else if(m.type==='sync.snapshot'){
 const p=m.payload||{};
 if(p.firm&&(!state.firm||(p.firm.updatedAt||0)>(state.firm.updatedAt||0))){state.firm=p.firm;await idbPut('firms',p.firm)}
 for(const a of(p.advisers||[])){const local=state.advisers.find(x=>x.id===a.id);if(!local||(a.updatedAt||0)>(local.updatedAt||0)){await saveAdviser(a,'sync from '+m.source,true)}}

 if(!local||(a.updatedAt||0)>(local.updatedAt||0)){await saveAdviser(a,'mesh '+m.type+' from '+m.source,true);render()}
 }else if(m.type==='firm.updated'){

 }
 }catch(e){console.warn('client mesh error',e)}
}
async function handleMortgageMesh(m){
 if(!m||m.source===TOOLNAME)return;
 try{
 if(m.type==='sync.request'){
 broadcastMortgage('sync.snapshot',{cases:state.cases,clients:state.clients,advisers:state.advisers,firm:state.firm});

 }
 }catch(e){console.warn('mortgage mesh error',e)}
}

 });
 }catch(e){}
}

// ════════════════════════════════════════════════════════════════
// AFFORDABILITY ENGINE · FCA SS3/19 stress test
// ════════════════════════════════════════════════════════════════
function caseGrossIncome(mc){
 if(!mc||!mc.applicants)return 0;
 let total=0;
 for(const a of mc.applicants){
 total+=(+a.basicSalary||0);
 total+=(+a.bonus||0)*RULES.bonusInclusion;
 total+=(+a.otherIncome||0);
 }
 return total;
}
function caseExpenditure(mc){
 if(!mc||!mc.affordability)return 0;
 return (+mc.affordability.expenditure||0)*12; // monthly to annual
}
function caseNetIncome(grossAnnual){
 // very approximate UK net: PA 12570, basic 20% to 50270, higher 40% to 125140, additional 45%
 // plus NI 8% main / 2% upper
 if(!grossAnnual||grossAnnual<=0)return 0;
 const pa=Math.max(0,12570-Math.max(0,grossAnnual-100000)/2);
 let tax=0;let r=Math.max(0,grossAnnual-pa);
 const basic=Math.min(r,37700);tax+=basic*0.20;r-=basic;
 const higher=Math.min(r,125140-50270);tax+=higher*0.40;r-=higher;
 if(r>0)tax+=r*0.45;
 let ni=0;
 const niMain=Math.max(0,Math.min(grossAnnual,50270)-12570);ni+=niMain*0.08;
 const niUpper=Math.max(0,grossAnnual-50270);ni+=niUpper*0.02;
 return grossAnnual-tax-ni;
}
function monthlyRepayment(principal,annualRate,years){
 const r=annualRate/12;const n=years*12;
 if(r<=0)return principal/n;
 return principal*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}
function maxMortgageAffordability(mc){
 if(!mc)return{maxLTI:0,maxStressed:0,monthlyAtProduct:0,monthlyStressed:0,stressRate:0,netMonthly:0,disposableMonthly:0,dti:0,ltv:0};
 const gross=caseGrossIncome(mc);
 const net=caseNetIncome(gross);
 const netMonthly=net/12;
 const committedMonthly=+mc.affordability.expenditure||0;
 const disposableMonthly=Math.max(0,netMonthly-committedMonthly);
 // LTI cap
 const maxLTI=gross*RULES.ltiCap;
 // Stress test rate: max(stressFloor, product+margin, SVR+margin)
 const productRate=(+mc.product.rate||0)/100||RULES.defaultSVR;
 const stressRate=Math.max(RULES.stressFloor, productRate+RULES.stressMargin, RULES.defaultSVR+RULES.stressMargin);
 // Solve max principal where stressed monthly <= disposable * 0.45 (rule of thumb cap on housing share of disposable)
 const cap=disposableMonthly*0.45;
 // Reverse-engineer: principal = monthly * ((1+r)^n - 1) / (r * (1+r)^n) where r=monthly stress rate
 const r=stressRate/12;const n=(mc.loan.term||25)*12;
 let maxStressed=0;
 if(r>0 && cap>0) maxStressed = cap*(Math.pow(1+r,n)-1)/(r*Math.pow(1+r,n));
 else maxStressed = cap*n;
 // BTL: ICR test instead
 const isBTL=mc.type&&mc.type.indexOf('BTL')===0;
 let btlMaxLoan=0;
 if(isBTL && mc.property.value){
 const rentMonthly=+mc.affordability.expectedRent||0;
 const stressedInterest=Math.max(RULES.btlStressRate, productRate+0.02);
 if(stressedInterest>0&&rentMonthly>0) btlMaxLoan=(rentMonthly*12)/(stressedInterest*RULES.btlICR);
 }
 const monthlyAtProduct=mc.loan.amount? monthlyRepayment(mc.loan.amount, productRate, mc.loan.term||25):0;
 const monthlyStressed=mc.loan.amount? monthlyRepayment(mc.loan.amount, stressRate, mc.loan.term||25):0;
 const ltv=mc.property.value?(mc.loan.amount/mc.property.value):0;
 const dti=gross?(mc.loan.amount/gross):0;
 return{
 gross,net,netMonthly,committedMonthly,disposableMonthly,
 maxLTI,maxStressed,btlMaxLoan,isBTL,
 monthlyAtProduct,monthlyStressed,stressRate,productRate,
 ltv,dti,
 capHeadroom:cap-monthlyStressed
 };
}

// T0 RULE BASE · 14 MCOB/FCA rules · offline answers
// ════════════════════════════════════════════════════════════════
const T0_RULES=[
 {q:['mcob','suitability','4.7','reason'],a:'MCOB 4.7 (Suitability) requires the broker to assess whether a regulated mortgage contract is suitable for the customer before making a personal recommendation. The broker MUST consider: (a) customer needs/circumstances, (b) ability to repay, (c) eligibility, (d) appropriateness of type/term/rate. A suitability letter/statement must be issued. FallMortgage captures the reason, signs it with adviser ID + SHA-256 + timestamp on the suitability tab.',src:'MCOB 4.7A'},
 {q:['esis','kfi','when','illustration'],a:'Since the Mortgage Credit Directive (MCD) took effect 21 March 2016, ESIS (European Standardised Information Sheet) replaced the KFI for almost all first-charge mortgages, second-charge mortgages, and consumer buy-to-let. KFI may still apply to some "MCD-exempt" cases (high-net-worth, business loans) where the firm has chosen to remain on KFI. The standard practice: issue ESIS at or before personal recommendation; binding offer must be made; reflection period (right to withdraw or 7-day reflection depending on lender) must run.',src:'MCOB 5A / MCD'},
 {q:['stress','test','ss3','19','rate','fca'],a:'FCA SS3/19 (interpreting MCOB 11.6) requires affordability assessments to include an interest rate stress test. Typical practice: stress at the higher of (a) the lender\'s reversion rate (or current SVR) + 3 percentage points, or (b) an absolute floor (often 7-8%). For fixed-rate products of 5+ years some lenders apply a lower stress. FallMortgage default: max(8%, productRate + 3%). Configure in case Affordability tab.',src:'FCA PS19/27 / MCOB 11.6'},
 {q:['procuration','fee','disclosure','timing','proc'],a:'Procuration fee (commission from lender) must be disclosed to the customer in cash terms in the ESIS (where applicable) AND in the IDD/Initial Disclosure. The amount the broker will earn must be stated. Failure to disclose = MCOB 4.4A breach + FCA Principle 7 breach. FallMortgage records the fee at case level + emits procurationFee.recorded mesh event.',src:'MCOB 4.4A / Principle 7'},
 {q:['clawback','period','typical','lender'],a:'Typical lender clawback window for procuration fee: 6 months full clawback if remortgage/redemption, sliding scale to 0% by month 24-36. Common shapes: 100% in months 1-6, 50% months 7-12, 0% from month 13+ — but varies (NatWest, Halifax, Santander each differ). FallMortgage flags clawback risk if completion < 24 months ago and case status is at risk. Configure per-lender in product tab.',src:'lender T&Cs'},
 {q:['ar','da','appointed','representative','directly','authorised','broker'],a:'AR = Appointed Representative — operates under a Principal\'s FCA permission (e.g. Stonebridge, Sesame, MAB, Openwork, Tenet, The Right Mortgage Network). The Principal owns compliance/lifecycle. DA = Directly Authorised — firm holds own FCA permission, full PI cover, own compliance. AR firms typically pay 15-30% of proc fee to the network. FallMortgage stores firm.network = "DA" or AR network name, and marks AR cases visible-to-network with networkRef.',src:'FCA SUP 12'},
 {q:['mmr','affordability','post','2014','review'],a:'MMR (Mortgage Market Review) took effect 26 April 2014. Key changes: (a) full income evidence required (no self-cert), (b) affordability assessment must consider committed expenditure + basic essentials + plausible future changes, (c) stress test against rate rises, (d) interest-only requires credible repayment vehicle. FallMortgage Affordability tab implements gross→net→committed→disposable→stress chain.',src:'PS14/3 / MCOB 11'},
 {q:['high','ltv','95','stress','test'],a:'Higher-LTV lending (>85% LTV especially 95% Mortgage Guarantee Scheme) commonly attracts: (a) tighter stress test, (b) restricted LTI typically capped at 4.49x, (c) higher product rate. Bank of England flow limit: max 15% of a lender\'s new mortgages above 4.5x LTI per quarter. FallMortgage flags LTV>85% in affordability tab.',src:'BoE FPC / MG Scheme'},
 {q:['btl','portfolio','landlord','pra','ss13'],a:'PRA SS13/16 portfolio landlord rules (4+ mortgaged BTL properties): underwriting must use specialist approach considering experience, portfolio cashflow, asset/liability statement, business plan. Stress at min 5.5% (PRA-aligned). ICR typically 145% for higher-rate taxpayer / limited co, 125% basic-rate. FallMortgage uses 5.5% / 1.45 ICR defaults — adjust per-lender.',src:'PRA SS13/16'},
 {q:['help','to','buy','schemes','status'],a:'Help to Buy Equity Loan (England): CLOSED to new applications 31 Mar 2023, completions wrapped Mar 2023. Help to Buy ISA: CLOSED to new accounts 30 Nov 2019, existing holders may still claim bonus until 1 Dec 2030. Lifetime ISA: open, 25% bonus to £1k/yr on £4k, first-home up to £450k or age 60+ pension use. Shared Ownership: open, all UK. Mortgage Guarantee Scheme: extended to end June 2025 — verify current status before use.',src:'gov.uk schemes register'},
 {q:['first','time','buyer','isa','bonus','lisa'],a:'Lifetime ISA (LISA) first-time buyer: pay in up to £4,000/yr (counts toward £20k ISA allowance), Government adds 25% bonus = up to £1,000/yr. Use for first home up to £450,000. Penalty 25% on non-qualifying withdrawal (effectively a 6.25% net loss of own contribution). Account must be open 12+ months before first-home use. FallMortgage records LISA contribution per applicant as part of deposit source.',src:'gov.uk / HMRC'},
 {q:['self','employed','proof','income','sa302'],a:'Self-employed proof of income for UK mortgage: (a) SA302 + Tax Year Overview for last 2-3 years (some lenders accept 1 year + accountant cert), (b) accountant\'s certificate (ACA/ACCA/CIMA/AAT/CIOT), (c) full statutory accounts for limited company directors, (d) business bank statements 3-6 months. Lenders typically average last 2 years\' profit; some use latest year if higher OR lower (conservative). Day-one director still tricky.',src:'lender criteria'},
 {q:['contractor','mortgage','day','rate','gross'],a:'Contractor mortgage day-rate calculation: typical lender formula = day rate × 5 days × 46-48 weeks = annualised gross. (FallMortgage default: dayRate × 46 weeks.) Lenders that accept contractor income on day-rate basis: Halifax, Clydesdale, Skipton, Kensington, Newcastle BS, others. Usually need: (a) 12+ months contracting history (some accept 6), (b) min £500/day or specified threshold, (c) current contract with 4+ weeks remaining.',src:'lender criteria'},
 {q:['equity','release','ship','erc','lifetime'],a:'Equity Release Council (formerly SHIP) standards apply to lifetime mortgages and home reversion plans: (a) No-Negative-Equity Guarantee, (b) right to remain in property for life, (c) right to move (subject to lender approval) with portability, (d) independent legal advice mandatory, (e) cap on early repayment charges in defined circumstances. Adviser must hold ER1/ER2/CeRER qualification beyond CeMAP. MCOB 8.5A applies.',src:'Equity Release Council / MCOB 8.5A'}
];
function answerQuestion(query){
 const q=(query||'').toLowerCase();
 let best=null;let bestScore=0;
 for(const r of T0_RULES){
 let score=0;
 for(const kw of r.q) if(q.indexOf(kw)>=0) score+=2;
 if(score>bestScore){bestScore=score;best=r}
 }
 if(best&&bestScore>=2){
 return{text:best.a,source:best.src,tier:'T0'};
 }
 return{text:'No deterministic match in the 14 MCOB/FCA T0 rules. Try keywords: MCOB 4.7 · ESIS · KFI · SS3/19 · stress · procuration · clawback · AR · DA · MMR · LTV · BTL portfolio · Help to Buy · LISA · self-employed · contractor · equity release · ICR. For free-form queries, configure a BYOK key (Anthropic/OpenAI/Gemini/OpenRouter) in Settings to enable T3.',source:'T0 rule base',tier:'T0'};
}

 }).join('');

async function updPrimaryClient(id,field,v){
 const cl=state.clients.find(x=>x.id===id);if(!cl)return;

 else cl[field]=v;

 mc.applicants=mc.applicants||[];

async function updApplicantContractor(caseId,i,dayRate,weeks){

 const dr=+mc.applicants[i].dayRate||0;const wk=+mc.applicants[i].contractWeeks||RULES.contractorMultiplier;
 mc.applicants[i].basicSalary=dr*5*wk;

function renderAffordability(view){

function buildEsis(mc){
 const cl=clientOf(mc);
 const a=maxMortgageAffordability(mc);
 const totalCostInterest=(a.monthlyAtProduct*mc.loan.term*12)-mc.loan.amount;
 const aprc=mc.product.rate||0; // simplified
 const apr=(aprc*1.05).toFixed(2);
 return{
 issuedAt:Date.now(),
 section1_lender:{name:mc.loan.lender||'(lender TBC)',broker:state.firm.name,brokerFCA:state.firm.fcaRefNo,network:mc.network||state.firm.network},
 section2_product:{name:mc.loan.productCode||'(product TBC)',type:mc.product.type,period:mc.product.period+' years '+mc.product.type,repayment:mc.loan.repayment,duration:mc.loan.term+' years'},
 section3_interestRate:{rate:mc.product.rate+'%',type:mc.product.type,period:mc.product.period+' years',apr:apr+'%'},
 section4_amount:{loanAmount:mc.loan.amount,currency:'GBP',propertyValue:mc.property.value,ltv:(a.ltv*100).toFixed(1)+'%'},
 section5_frequency:{frequency:'monthly',numberOfPayments:mc.loan.term*12,firstPayment:a.monthlyAtProduct.toFixed(2),totalInterest:totalCostInterest.toFixed(2),totalCost:(mc.loan.amount+totalCostInterest).toFixed(2)},
 section6_illustrativeRepayment:{firstYear12Months:(a.monthlyAtProduct*12).toFixed(2),atRevertRate:(a.monthlyStressed*12).toFixed(2)+' (stress @ '+pct(a.stressRate)+')'},
 section7_additionalObligations:{insurance:'Buildings insurance required by lender'},
 section8_earlyRepayment:{ercSchedule:mc.product.ercSchedule||[],note:'See ERC schedule'},
 section9_otherRights:{reflectionPeriod:'7-day reflection per MCD',cooling:'Right to withdraw within reflection period'},
 section10_complaints:{firm:state.firm.name+' — direct complaint then FOS (Financial Ombudsman Service)',fos:'financial-ombudsman.org.uk'},
 section11_nonCompliance:{warning:'Failure to comply may result in loss of property; mortgage is secured against the property'},
 section12_additional:{procurationFee:'£'+(+mc.procurationFee||0).toLocaleString('en-GB')+' commission paid by lender to broker',regulator:'FCA · firm ref '+state.firm.fcaRefNo}
 };
}
function renderEsis(view){
 const mc=activeCase();if(!mc){view.insertAdjacentHTML('beforeend',noActiveCaseNode());return}
 const esisData=mc.esisSnapshot||buildEsis(mc);
 const html=`<div class="section-h"><h2>ESIS · European Standardised Information Sheet</h2>
 <span class="sub">MCD 2016 · MCOB 5A · replaces KFI for most products</span>
 <div class="actions">
 <button class="btn primary" onclick="issueEsis('${mc.id}')">issue ESIS</button>
 <button class="btn ghost" onclick="exportEsisMD('${mc.id}')">export markdown</button>
 <button class="btn ghost" onclick="handoffEsisPaper('${mc.id}')">handoff to FallMortgagePaper</button>
 </div></div>
 ${mc.esisIssuedAt?`<div class="flag green">ESIS issued ${dateStr(mc.esisIssuedAt)} · snapshot frozen on issue. Re-issuing will overwrite snapshot.</div>`:'<div class="flag amber">ESIS not yet issued. Click issue ESIS to freeze a snapshot and stamp the timeline.</div>'}
 ${[
 ['1. Lender / Broker',esisData.section1_lender],
 ['2. Product',esisData.section2_product],
 ['3. Interest rate',esisData.section3_interestRate],
 ['4. Loan amount',esisData.section4_amount],
 ['5. Frequency & cost',esisData.section5_frequency],
 ['6. Illustrative repayment',esisData.section6_illustrativeRepayment],
 ['7. Additional obligations',esisData.section7_additionalObligations],
 ['8. Early repayment',esisData.section8_earlyRepayment],
 ['9. Reflection period & withdrawal rights',esisData.section9_otherRights],
 ['10. Complaints',esisData.section10_complaints],
 ['11. Non-compliance warning',esisData.section11_nonCompliance],
 ['12. Additional disclosures',esisData.section12_additional]
 ].map(([title,obj])=>`<div class="esis-block"><h4>${esc(title)}</h4>
 ${Object.entries(obj).map(([k,v])=>{
 if(Array.isArray(v))v=v.length?JSON.stringify(v):'(none)';
 else if(typeof v==='object')v=JSON.stringify(v);
 return `<div class="row-kv"><span class="l">${esc(k)}</span><span class="v">${esc(v)}</span></div>`;

async function issueEsis(id){
 const mc=state.cases.find(x=>x.id===id);if(!mc)return;
 const data=buildEsis(mc);
 mc.esisSnapshot=data;mc.esisIssuedAt=Date.now();
 mc.timeline=mc.timeline||[];mc.timeline.push({ts:Date.now(),what:'ESIS issued',adviserId:state.settings.currentAdviserId||''});
 await saveCase(mc,'ESIS issued');
 broadcastMortgage('esis.issued',{caseId:mc.id,ref:mc.ref,snapshot:data});

function esisToMarkdown(mc){
 const e=mc.esisSnapshot||buildEsis(mc);
 let md='# ESIS · '+mc.ref+'\n\n_Issued: '+dateStr(e.issuedAt)+' · '+state.firm.name+' · FCA '+state.firm.fcaRefNo+'_\n\n';
 for(const [title,key] of [['1. Lender / Broker','section1_lender'],['2. Product','section2_product'],['3. Interest rate','section3_interestRate'],['4. Loan amount','section4_amount'],['5. Frequency & cost','section5_frequency'],['6. Illustrative repayment','section6_illustrativeRepayment'],['7. Additional obligations','section7_additionalObligations'],['8. Early repayment','section8_earlyRepayment'],['9. Reflection / withdrawal','section9_otherRights'],['10. Complaints','section10_complaints'],['11. Non-compliance','section11_nonCompliance'],['12. Additional','section12_additional']]){
 md+='## '+title+'\n\n';
 for(const [k,v] of Object.entries(e[key]||{})){
 let val=v;if(Array.isArray(v))val=v.length?JSON.stringify(v):'(none)';else if(typeof v==='object')val=JSON.stringify(v);
 md+='- **'+k+':** '+val+'\n';
 }
 md+='\n';
 }
 md+='\n---\n_Generated by FallMortgage v'+VERSION+' · sovereign single-file UK mortgage broker case management. Verify against lender illustration before issuing to customer._\n';
 return md;
}
function exportEsisMD(id){
 const mc=state.cases.find(x=>x.id===id);if(!mc)return;
 const md=esisToMarkdown(mc);

function handoffEsisPaper(id){

}

async function importAll(file){
 if(!file)return;
 try{
 const text=await file.text();
 const data=JSON.parse(text);
 if(data.firm)state.firm=data.firm;await idbPut('firms',state.firm);
 for(const a of(data.advisers||[]))await idbPut('advisers',a);
 for(const c of(data.clients||[]))await idbPut('clients',c);
 for(const m of(data.cases||[]))await idbPut('cases',m);
 for(const a of(data.audit||[]))await idbPut('audit',a);
 await loadAllStores();
 render();toast('imported');
 }catch(e){toast('import failed: '+e.message)}
}
async function wipeAll(){
 if(!confirm('Wipe all data? This deletes firms, advisers, clients, cases, audit. Cannot undo.'))return;
 for(const s of STORES){try{const tx=db.transaction(s,'readwrite');tx.objectStore(s).clear()}catch(e){}}
 localStorage.clear();
 state={active:'dashboard',activeCaseId:null,firm:null,advisers:[],clients:[],cases:[],lenderProducts:[],audit:[],settings:{anthropicKey:'',geminiKey:'',openaiKey:'',openrouterKey:'',auditChain:true,currentAdviserId:null},chat:[],drawerOpen:false,filters:{q:'',type:'',status:'',adviser:'',due:''}};
 onboardStep=1;onboardFirm=null;onboardAdv=null;
 closeModal();render();toast('wiped');
}

// ════════════════════════════════════════════════════════════════
// PALETTE (Ctrl+K)
// ════════════════════════════════════════════════════════════════
function openPalette(){
 $('#palette').classList.add('open');setTimeout(()=>$('#pInput').focus(),50);renderPalette();
}
function closePalette(){$('#palette').classList.remove('open')}
$('#palette').addEventListener('click',e=>{if(e.target.id==='palette')closePalette()});
$('#pInput').addEventListener('input',renderPalette);
$('#pInput').addEventListener('keydown',e=>{
 if(e.key==='Enter'){runPaletteAsk()}
 if(e.key==='Escape')closePalette();
});
function renderPalette(){
 const q=($('#pInput').value||'').toLowerCase().trim();
 const body=$('#pBody');
 const actions=[
 {label:'+ new case',fn:()=>{closePalette();newCase()}},
 {label:'dashboard',fn:()=>{closePalette();showApp('dashboard')}},
 {label:'cases',fn:()=>{closePalette();showApp('cases')}},
 {label:'firm',fn:()=>{closePalette();showApp('firm')}},
 {label:'audit chain',fn:()=>{closePalette();showApp('audit')}},
 {label:'settings',fn:()=>{closePalette();openModal('settings')}}
 ];
 let rows='';
 // T0 questions
 const matches=T0_RULES.filter(r=>!q||r.q.some(k=>k.indexOf(q)>=0)||r.a.toLowerCase().indexOf(q)>=0).slice(0,5);
 for(const r of matches){rows+=`<div class="palette-row" onclick="runT0(${JSON.stringify(r.q[0]).replace(/'/g,'&apos;')})"><span class="tag dim">T0</span><span>${esc(r.q.slice(0,4).join(' · '))}</span></div>`}
 // cases
 if(q){
 const matches2=state.cases.filter(mc=>(mc.ref+' '+(clientName(clientOf(mc)))+' '+mc.loan.lender).toLowerCase().indexOf(q)>=0).slice(0,5);
 for(const mc of matches2){rows+=`<div class="palette-row" onclick="selectCase('${mc.id}');closePalette();showApp('overview')"><span class="tag">case</span><span>${esc(mc.ref)} · ${esc(clientName(clientOf(mc)))}</span></div>`}
 }
 for(const a of actions){if(!q||a.label.indexOf(q)>=0)rows+=`<div class="palette-row" onclick="(${a.fn.toString()})()"><span class="tag dim">action</span><span>${esc(a.label)}</span></div>`}
 if(q)rows=`<div class="palette-row" onclick="runPaletteAsk()" style="border-bottom:1px solid var(--line);background:var(--ink)"><span class="tag">ask</span><span>${esc(q)}</span></div>`+rows;
 body.innerHTML=rows||'<div class="empty-state">type a question or action</div>';
}
async function runPaletteAsk(){
 const q=($('#pInput').value||'').trim();if(!q)return;
 closePalette();
 showApp('qa');
 state.chat.push({role:'user',text:q});
 const ans=await answerQuestion(q);
 state.chat.push({role:'bot',text:ans.text,source:ans.source,tier:ans.tier});
 await saveMeta();render();
}
async function runT0(kw){
 closePalette();
 showApp('qa');
 state.chat.push({role:'user',text:kw});
 const ans=await answerQuestion(kw);
 state.chat.push({role:'bot',text:ans.text,source:ans.source,tier:ans.tier});
 await saveMeta();render();
}
document.addEventListener('keydown',e=>{
 if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openPalette()}
 if(e.key==='Escape'){closeModal();closePalette()}
});

async function newCase(){
 const mc=newBlankCase();
 await saveCase(mc,'new case created');
 broadcastMortgage('case.created',mc);
 state.activeCaseId=mc.id;state.active='applicants';
 await saveMeta();render();toast('case '+mc.ref);
}
